name: verify-export-integrity

# Blocks hand-edits of the generated skills/ tree: the exported files must match
# the sha256 provenance recorded in skills/EXPORT-MANIFEST.json. Self-contained —
# needs no access to the canonical source repositories.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify generated skills/ matches EXPORT-MANIFEST.json
        run: python3 scripts/verify_export_integrity.py .
      - name: Unit tests for the integrity verifier
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
